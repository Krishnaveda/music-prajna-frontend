<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Prajna - Raaga Identifier</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html, body {
            width: 100%;
            height: 100%;
            -webkit-user-select: none;
            user-select: none;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            padding: 30px 20px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            animation: slideIn 0.5s ease-out;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo {
            width: 120px;
            height: 120px;
            margin: 0 auto 15px;
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        
        h1 {
            color: #333;
            margin-bottom: 5px;
            font-size: 28px;
        }
        
        .subtitle {
            color: #666;
            font-size: 14px;
        }
        
        .section {
            margin-bottom: 25px;
        }
        
        .section h2 {
            color: #667eea;
            font-size: 14px;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        button {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-record {
            background: #667eea;
            color: white;
        }
        
        .btn-record:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        
        .btn-stop {
            background: #ff6b6b;
            color: white;
            display: none;
        }
        
        .btn-upload {
            background: #51cf66;
            color: white;
        }
        
        .btn-upload:hover {
            background: #40c057;
        }
        
        .btn-identify {
            background: #764ba2;
            color: white;
            width: 100%;
            padding: 15px;
            font-size: 16px;
            margin-top: 10px;
        }
        
        .btn-identify:hover {
            background: #6a3e96;
        }
        
        input[type="file"] {
            display: none;
        }
        
        .file-input-label {
            display: inline-block;
            padding: 15px 30px;
            background: #51cf66;
            color: white;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            text-align: center;
            width: 100%;
        }
        
        .file-input-label:hover {
            background: #40c057;
            transform: translateY(-2px);
        }
        
        .status {
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            text-align: center;
            font-weight: 600;
        }
        
        .status.recording {
            background: #ffe0e0;
            color: #d32f2f;
        }
        
        .status.ready {
            background: #e8f5e9;
            color: #388e3c;
        }
        
        .result {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }
        
        .result.show {
            display: block;
        }
        
        .result-item {
            margin-bottom: 15px;
        }
        
        .result-label {
            color: #666;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }
        
        .result-value {
            color: #333;
            font-size: 24px;
            font-weight: 700;
        }
        
        .confidence {
            color: #667eea;
        }
        
        .swaras-display {
            background: #e8f5e9;
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
        }
        
        .swara-tag {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 4px 8px;
            margin: 2px;
            border-radius: 4px;
            font-size: 12px;
        }
        
        .alternatives {
            background: white;
            padding: 15px;
            border-radius: 8px;
            margin-top: 10px;
        }
        
        .alt-raga {
            padding: 10px;
            margin: 5px 0;
            background: #f0f0f0;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
        }
        
        .loading {
            display: none;
            text-align: center;
            color: #667eea;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .feedback {
            display: none;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
        
        .feedback.show {
            display: block;
        }
        
        .feedback-buttons {
            display: flex;
            gap: 10px;
        }
        
        .feedback-buttons button {
            flex: 1;
            padding: 12px;
        }
        
        .btn-correct {
            background: #51cf66;
            color: white;
        }
        
        .btn-wrong {
            background: #ff6b6b;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="prajna-icon.png" alt="Music Prajna" class="logo">
            <h1>Music Prajna</h1>
            <p class="subtitle">Raaga Identifier</p>
        </div>

        <div class="section">
            <h2>Record Live Performance</h2>
            <div class="button-group">
                <button class="btn-record" onclick="startRecording()">🎙️ Record</button>
                <button class="btn-stop" onclick="stopRecording()" id="stopBtn">⏹️ Stop</button>
            </div>
            <div class="status" id="recordStatus"></div>
        </div>

        <div class="section">
            <h2>Or Upload Audio File</h2>
            <label class="file-input-label">
                📁 Choose File
                <input type="file" id="audioFile" accept=".mp3,.wav,.flac,.m4a" onchange="fileSelected()">
            </label>
        </div>

        <button class="btn-identify" onclick="identifyRaaga()">🔍 Identify Raaga</button>

        <div class="loading" id="loading">
            <p>Analyzing audio...</p>
            <div class="spinner"></div>
        </div>

        <div class="result" id="result">
            <div class="result-item">
                <div class="result-label">Identified Raaga</div>
                <div class="result-value" id="ragaName">-</div>
            </div>
            <div class="result-item">
                <div class="result-label">Melakartha</div>
                <div class="result-value" id="melakartha">-</div>
            </div>
            <div class="result-item">
                <div class="result-label">Confidence</div>
                <div class="result-value confidence" id="confidence">-</div>
            </div>

            <div class="result-item">
                <div class="result-label">Identified Swaras</div>
                <div class="swaras-display" id="swarasDisplay"></div>
            </div>

            <div class="result-item">
                <div class="result-label">Other Possibilities</div>
                <div class="alternatives" id="alternatives"></div>
            </div>

            <div class="feedback" id="feedback">
                <p style="margin-bottom: 15px; color: #666; font-size: 14px;">Was this correct?</p>
                <div class="feedback-buttons">
                    <button class="btn-correct" onclick="submitFeedback(true)">✓ Correct</button>
                    <button class="btn-wrong" onclick="submitFeedback(false)">✗ Wrong</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // UPDATE THIS WITH YOUR RAILWAY BACKEND URL
        const API_URL = 'https://your-backend-url.up.railway.app';
        
        let mediaRecorder;
        let audioChunks = [];
        let recordedBlob = null;
        let selectedFile = null;

        async function startRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];

                mediaRecorder.ondataavailable = (event) => {
                    audioChunks.push(event.data);
                };

                mediaRecorder.onstop = () => {
                    recordedBlob = new Blob(audioChunks, { type: 'audio/wav' });
                    document.getElementById('recordStatus').textContent = '✓ Recording saved';
                    document.getElementById('recordStatus').className = 'status ready';
                };

                mediaRecorder.start();
                document.querySelector('.btn-record').style.display = 'none';
                document.getElementById('stopBtn').style.display = 'block';
                document.getElementById('recordStatus').textContent = '🔴 Recording...';
                document.getElementById('recordStatus').className = 'status recording';
            } catch (error) {
                alert('Microphone access denied');
            }
        }

        function stopRecording() {
            mediaRecorder.stop();
            mediaRecorder.stream.getTracks().forEach(track => track.stop());
            document.querySelector('.btn-record').style.display = 'block';
            document.getElementById('stopBtn').style.display = 'none';
        }

        function fileSelected() {
            selectedFile = document.getElementById('audioFile').files[0];
            if (selectedFile) {
                document.getElementById('recordStatus').textContent = `✓ File: ${selectedFile.name}`;
                document.getElementById('recordStatus').className = 'status ready';
            }
        }

        async function identifyRaaga() {
            const audioToSend = recordedBlob || selectedFile;

            if (!audioToSend) {
                alert('Please record or upload audio first');
                return;
            }

            const formData = new FormData();
            formData.append('audio', audioToSend);

            document.getElementById('loading').style.display = 'block';
            document.getElementById('result').classList.remove('show');

            try {
                const response = await fetch(`${API_URL}/api/identify`, {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.status === 'success') {
                    const match = data.top_match;
                    document.getElementById('ragaName').textContent = match.raaga;
                    document.getElementById('melakartha').textContent = `Melakartha ${match.melakartha}`;
                    document.getElementById('confidence').textContent = match.confidence + '%';
                    
                    // Display swaras
                    const swarasHtml = data.identified_swaras.map(s => 
                        `<span class="swara-tag">${s}</span>`
                    ).join(' ');
                    document.getElementById('swarasDisplay').innerHTML = swarasHtml;
                    
                    // Display alternatives
                    const altHtml = data.alternatives.map(alt =>
                        `<div class="alt-raga"><span>${alt.raaga}</span><span>${alt.confidence}%</span></div>`
                    ).join('');
                    document.getElementById('alternatives').innerHTML = altHtml;
                    
                    document.getElementById('result').classList.add('show');
                    document.getElementById('feedback').classList.add('show');
                    
                    window.currentPrediction = match.raaga;
                    window.currentSwaras = data.identified_swaras;
                } else {
                    alert('Error: ' + (data.error || 'Unknown error'));
                }
            } catch (error) {
                alert('Error connecting to backend. Make sure API_URL is correct.');
                console.error(error);
            }

            document.getElementById('loading').style.display = 'none';
        }

        async function submitFeedback(isCorrect) {
            const actual = isCorrect ? window.currentPrediction : prompt('What is the correct raaga?');

            if (actual) {
                try {
                    await fetch(`${API_URL}/api/feedback`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            predicted: window.currentPrediction,
                            actual: actual,
                            confidence: document.getElementById('confidence').textContent,
                            swaras: window.currentSwaras
                        })
                    });

                    alert('Feedback saved! Thank you!');
                    document.getElementById('feedback').classList.remove('show');
                } catch (error) {
                    console.error(error);
                }
            }
        }
    </script>
</body>
</html>
