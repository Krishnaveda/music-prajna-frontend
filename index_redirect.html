<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Prajna - Raaga Identifier</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-width: 500px;
            width: 100%;
        }
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 10px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }
        button {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-record {
            background: #667eea;
            color: white;
        }
        .btn-record:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }
        .result {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }
        .result.show {
            display: block;
        }
        .result-item {
            margin: 10px 0;
        }
        .label {
            color: #666;
            font-size: 12px;
            text-transform: uppercase;
        }
        .value {
            color: #333;
            font-size: 24px;
            font-weight: bold;
        }
        .status {
            text-align: center;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
        }
        .status.recording {
            background: #ffe0e0;
            color: #d32f2f;
        }
        .status.ready {
            background: #e8f5e9;
            color: #388e3c;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎻 Music Prajna</h1>
        <p class="subtitle">Raaga Identifier</p>

        <button class="btn-record" onclick="startRecording()">🎤 Record</button>
        <button class="btn-record" onclick="stopRecording()" id="stopBtn" style="display:none; background:#ff6b6b;">⏹️ Stop</button>

        <div class="status" id="status"></div>

        <label>
            <button class="btn-record" style="background:#51cf66;">📁 Upload File</button>
            <input type="file" id="audioFile" accept=".mp3,.wav" onchange="fileSelected()" style="display:none;">
        </label>

        <button class="btn-record" style="background:#764ba2; margin-top:20px;" onclick="identify()">🔍 Identify Raaga</button>

        <div class="result" id="result">
            <div class="result-item">
                <div class="label">Identified Raaga</div>
                <div class="value" id="raaga">-</div>
            </div>
            <div class="result-item">
                <div class="label">Confidence</div>
                <div class="value" id="confidence">-</div>
            </div>
            <div class="result-item">
                <div class="label">Melakartha</div>
                <div class="value" id="melakartha">-</div>
            </div>
        </div>
    </div>

    <script>
        let mediaRecorder;
        let audioChunks = [];
        let recordedBlob = null;
        let selectedFile = null;

        async function startRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];

                mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    recordedBlob = new Blob(audioChunks, { type: 'audio/wav' });
                    updateStatus('✓ Recording saved', 'ready');
                };

                mediaRecorder.start();
                document.querySelector('.btn-record').style.display = 'none';
                document.getElementById('stopBtn').style.display = 'block';
                updateStatus('🔴 Recording...', 'recording');
            } catch (e) {
                alert('Microphone access denied');
            }
        }

        function stopRecording() {
            mediaRecorder.stop();
            mediaRecorder.stream.getTracks().forEach(t => t.stop());
            document.querySelector('.btn-record').style.display = 'block';
            document.getElementById('stopBtn').style.display = 'none';
        }

        function fileSelected() {
            selectedFile = document.getElementById('audioFile').files[0];
            if (selectedFile) {
                updateStatus(`✓ File: ${selectedFile.name}`, 'ready');
            }
        }

        function updateStatus(msg, cls) {
            const status = document.getElementById('status');
            status.textContent = msg;
            status.className = 'status ' + cls;
        }

        function identify() {
            // Mock response for demo
            document.getElementById('raaga').textContent = 'Bhairav';
            document.getElementById('confidence').textContent = '85%';
            document.getElementById('melakartha').textContent = 'Melakartha 1';
            document.getElementById('result').classList.add('show');
        }
    </script>
</body>
</html>
